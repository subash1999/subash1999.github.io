name: Refresh portfolio dynamic fields

on:
  schedule:
    - cron: '0 0 * * *'  # daily 00:00 UTC = 09:00 JST
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'index.template.html'
      - '.github/scripts/bake-portfolio.py'
      - '.github/workflows/refresh-portfolio.yml'

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bake index.html from template
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: subash1999
          MEDIUM_HANDLE: subash.niroula4455
          CAREER_START: '2019-09-01'
          AXA_HIRE: '2023-09-16'
        run: |
          python3 .github/scripts/bake-portfolio.py

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          if ! git diff --cached --quiet; then
            git commit -m "chore(portfolio): bake dynamic fields ($(date -u +%F))"
            git push
          else
            echo 'no changes — index.html already current'
          fi
